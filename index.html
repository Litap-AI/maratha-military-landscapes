                const matchesSearch = fort.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                      fort.district.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesType = typeFilter === "All" || fort.type === typeFilter;
                return matchesSearch && matchesType;
            });

            const handleFortSelect = (fort) => {
                setSelectedFort(fort);
                setActiveFlowStep(0); // reset step flow on selection change

                    {/* LEFT SIDEBAR (1/3 Screen) */}

                        <div class="p-6 border-b border-gray-800 bg-gradient-to-r from-maratha-charcoal to-maratha-stone">

                                <span class="bg-maratha-saffron text-white px-3 py-1.5 rounded-md font-bold text-sm tracking-wider flex items-center gap-2">
                                    <i class="fa-solid fa-flag"></i> UNESCO
                                </span>
                                <h1 class="text-xs font-semibold uppercase tracking-widest text-maratha-brass">World Heritage Site</h1>
                            </div>
                            <h2 class="text-xl font-extrabold serif-title mt-2 text-gray-100 tracking-wide">
                                Maratha Military Landscapes
                            </h2>
                            <p class="text-xs text-gray-400 mt-1">
                                India's 44th World Heritage Property &bull; 12 Legendary Forts
                            </p>
                        </div>

                        {/* Search and Filters */}
                        <div class="p-4 bg-maratha-stone border-b border-gray-800 flex flex-col gap-3">
                            <div class="relative">
                                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                                <input 
                                    type="text" 
                                    placeholder="Search fort or district..."
                                    class="w-full pl-10 pr-4 py-2.5 bg-maratha-charcoal border border-gray-700 rounded-lg text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-maratha-saffron transition-all"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>

                            {/* Terrain Filter Pills */}
                            <div class="flex gap-1 overflow-x-auto no-scrollbar pb-1 text-xs">
                                {["All", "Hill", "Hill-Forest", "Hill-Plateau", "Coastal", "Island"].map((type) => (
                                    <button
                                        key={type}
                                        class={`px-3 py-1.5 rounded-full whitespace-nowrap font-medium transition-all ${
                                            typeFilter === type 
                                                ? "bg-maratha-saffron text-white shadow-md shadow-maratha-saffron/20" 
                                                : "bg-maratha-charcoal text-gray-400 hover:text-gray-200 border border-gray-800"
                                        }`}
                                        onClick={() => setTypeFilter(type)}
                                    >
                                        {type === "All" ? "All Terrains" : type}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Scrollable Forts List */}
                        <div class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-2.5 bg-maratha-charcoal/50">
                            {filteredForts.length > 0 ? (
                                filteredForts.map((fort) => (
                                    <div 
                                        key={fort.id}
                                        onClick={() => handleFortSelect(fort)}
                                        class={`group p-4 rounded-xl cursor-pointer border transition-all duration-300 flex items-center justify-between ${
                                            selectedFort.id === fort.id 
                                                ? "bg-gradient-to-r from-maratha-stone to-maratha-charcoal border-maratha-saffron/80 shadow-lg shadow-black/40" 
                                                : "bg-maratha-stone/40 hover:bg-maratha-stone border-transparent"
                                        }`}
                                    >
                                        <div class="flex items-center gap-3">
                                            {/* Terrain Icon Badge */}
                                            <div class={`w-10 h-10 rounded-lg flex items-center justify-center text-sm font-bold ${
                                                selectedFort.id === fort.id 
                                                    ? "bg-maratha-saffron text-white" 
                                                    : "bg-maratha-charcoal text-maratha-brass"
                                            }`}>
                                                {fort.type === "Hill" && <i class="fa-solid fa-mountain"></i>}
                                                {fort.type === "Hill-Forest" && <i class="fa-solid fa-tree"></i>}
                                                {fort.type === "Hill-Plateau" && <i class="fa-solid fa-layer-group"></i>}
                                                {fort.type === "Coastal" && <i class="fa-solid fa-water"></i>}
                                                {fort.type === "Island" && <i class="fa-solid fa-ship"></i>}
                                            </div>
                                            <div>
                                                <h3 class="font-bold text-sm text-gray-100 group-hover:text-maratha-saffron transition-colors">
                                                    {fort.name}
                                                </h3>
                                                <p class="text-xs text-gray-400">
                                                    {fort.district}, {fort.type === "Hill-Forest" ? "Forest" : fort.type === "Hill-Plateau" ? "Plateau" : fort.type} Fort
                                                </p>
                                            </div>
                                        </div>
                                        <i class={`fa-solid fa-chevron-right text-xs transition-transform duration-300 ${
                                            selectedFort.id === fort.id ? "text-maratha-saffron translate-x-1" : "text-gray-600"
                                        }`}></i>
                                    </div>
                                ))
                            ) : (
                                <div class="text-center py-12 text-gray-500 text-sm">
                                    <i class="fa-solid fa-ban mb-2 text-xl block text-gray-600"></i>
                                    No forts matched your filters.
                                </div>
                            )}
                        </div>

                        {/* Footer Info */}
                        <div class="p-4 border-t border-gray-800 bg-maratha-stone text-[10px] text-gray-500 flex justify-between items-center">
                            <span>Designed for Maratha History Research</span>
                            <span>v1.2 &bull; Active State</span>
                        </div>
                    </aside>

                    {/* RIGHT CONTENT AREA (2/3 Screen) */}
                    <main class="hidden md:flex flex-1 flex-col h-full bg-[#151718] overflow-y-auto no-scrollbar relative">
                        
                        {/* Interactive Mode Selector Header */}
                        <div class="p-6 border-b border-gray-800 bg-maratha-charcoal flex justify-between items-center sticky top-0 z-20 shadow-md">
                            <div>
                                <div class="flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-maratha-saffron">
                                    <i class="fa-solid fa-shield"></i> Tactical Analysis
                                </div>
                                <h2 class="text-3xl font-extrabold serif-title text-gray-100 flex items-center gap-3">
                                    {selectedFort.name}
                                    <span class="text-xs font-normal tracking-wide py-1 px-3.5 bg-maratha-stone/80 text-maratha-brass rounded-full border border-maratha-brass/30">
                                        {selectedFort.type} Terrain

                            </div>

                                    }`}

                            </div>

                        {/* Dynamic Details Block */}

                                <div class="bg-gradient-to-r from-maratha-stone/40 to-transparent p-4 rounded-xl border border-gray-800/60 flex gap-3 items-start">

                                    <div>
                                        <h4 class="text-xs font-bold uppercase tracking-wider text-maratha-brass">Outstanding Strategic Value</h4>
                                        <p class="text-xs text-gray-400 mt-1 italic">
                                            "{selectedFort.fastFact}"
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* Fast stats grid */}

                                <div class="grid grid-cols-2 gap-y-3 gap-x-2 text-xs">
                                    <div>
                                        <p class="text-gray-500">District Location</p>
                                        <p class="font-bold text-gray-200">{selectedFort.district}, MH</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-500">Elevation</p>
                                        <p class="font-bold text-gray-200">{selectedFort.elevation}</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-500">Authority Jurisdiction</p>
                                        <p class="font-bold text-gray-200 truncate" title={selectedFort.authority}>{selectedFort.authority}</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-500">GPS Coordinates</p>
                                        <p class="font-bold text-gray-200">{selectedFort.coordinates}</p>
                                    </div>
                                </div>
                                <div class="pt-3 border-t border-gray-800/60 text-center">
                                    <span class="text-[10px] bg-emerald-950/40 text-emerald-400 border border-emerald-900/40 py-1 px-2.5 rounded-full inline-flex items-center gap-1.5 font-bold">
                                        <i class="fa-solid fa-circle-check"></i> UNESCO Inscribed WHS
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Interactive Visuals Area (Maps / Diagrams) */}
                        <div class="p-6 pt-0 flex flex-col gap-6 flex-1">
                            
                            {/* Two Maps Grid */}
                            <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
                                
                                {/* MAP 1: Geographical Terrain & Core */}

                                    <div class="flex justify-between items-center mb-3">
                                        <h4 class="text-xs font-bold uppercase tracking-widest text-maratha-brass">
                                            Map 1 &bull; Topographical Context
                                        </h4>
                                        <span class="text-[10px] bg-maratha-charcoal text-gray-400 py-1 px-2.5 rounded-md border border-gray-800">
                                            Terrain: {selectedFort.type} Base
                                        </span>
                                    </div>

                                    <div class="flex-1 bg-maratha-charcoal rounded-lg relative overflow-hidden flex items-center justify-center border border-gray-800/80 shadow-inner">
                                        {viewMode === "interactive" ? (
                                            /* Beautiful styled vector map blueprint reflecting topographic elements */
                                            <div class="relative w-full h-full p-4 flex flex-col justify-between">
                                                {/* Simulated Topo lines in background */}
                                                <svg class="absolute inset-0 w-full h-full opacity-15" xmlns="http://www.w3.org/2000/svg">
                                                    <circle cx="50%" cy="50%" r="40" fill="none" stroke="white" stroke-width="0.5" />
                                                    <circle cx="50%" cy="50%" r="80" fill="none" stroke="white" stroke-width="0.5" stroke-dasharray="2 2" />
                                                    <circle cx="50%" cy="50%" r="140" fill="none" stroke="white" stroke-width="0.5" />
                                                    <circle cx="50%" cy="50%" r="200" fill="none" stroke="white" stroke-width="0.5" />
                                                </svg>

                                                {/* Customized vector representing fortress terrain type */}
                                                <div class="absolute inset-0 flex items-center justify-center">
                                                    {selectedFort.svgMap.terrain === "hill" && (
                                                        <div class="w-48 h-48 rounded-full bg-orange-950/20 border-2 border-orange-500/20 flex items-center justify-center animate-pulse">
                                                            <i class="fa-solid fa-mountain text-8xl text-maratha-saffron/10"></i>
                                                        </div>
                                                    )}
                                                    {selectedFort.svgMap.terrain === "island" && (
                                                        <div class="w-48 h-48 rounded-full bg-cyan-950/20 border-2 border-cyan-500/20 flex items-center justify-center animate-pulse">
                                                            <i class="fa-solid fa-water text-8xl text-cyan-500/10"></i>
                                                        </div>
                                                    )}
                                                    {selectedFort.svgMap.terrain === "forest" && (
                                                        <div class="w-48 h-48 rounded-full bg-emerald-950/20 border-2 border-emerald-500/20 flex items-center justify-center animate-pulse">
                                                            <i class="fa-solid fa-tree text-8xl text-emerald-500/10"></i>
                                                        </div>
                                                    )}
                                                    {selectedFort.svgMap.terrain === "coastal" && (
                                                        <div class="w-48 h-48 rounded-full bg-sky-950/20 border-2 border-sky-500/20 flex items-center justify-center animate-pulse">
                                                            <i class="fa-solid fa-anchor text-8xl text-sky-500/10"></i>
                                                        </div>
                                                    )}
                                                </div>

                                                {/* Radar sweep simulation to make it look premium/tactical */}
                                                <div class="absolute right-4 top-4 text-xs text-maratha-brass font-bold flex items-center gap-1.5 bg-maratha-stone/80 px-2 py-1 rounded border border-maratha-brass/20">
                                                    <span class="w-2 h-2 rounded-full bg-red-500 animate-ping"></span> Live Terrain Analysis
                                                </div>

                                                <div class="z-10 text-center mt-auto">
                                                    <p class="text-xs text-gray-400">Tactical Ridge Elevation & Bastion Layout Mapping</p>
                                                    <p class="text-[10px] text-gray-500 mt-0.5">Basalt Stone Footings & Layered Slopes Grid</p>
                                                </div>
                                            </div>
                                        ) : (
                                            /* fallback to real local GitHub path with instructions */
                                            <div class="p-6 text-center text-xs text-gray-400 h-full flex flex-col justify-center items-center">
                                                <img 
                                                    src={`images/${selectedFort.id}_geo.jpg`} 
                                                    alt="Geographical Map"
                                                    onError={(e) => {
                                                        e.target.onerror = null;
                                                        e.target.style.display = 'none';
                                                    }}
                                                    class="absolute inset-0 w-full h-full object-cover rounded-lg"
                                                />
                                                <div class="z-10 bg-maratha-charcoal/90 p-4 rounded-xl border border-gray-800">
                                                    <i class="fa-solid fa-file-image text-3xl text-maratha-saffron mb-2"></i>
                                                    <p class="font-bold">Git Asset Target:</p>
                                                    <code class="block text-maratha-brass my-1 p-1 bg-maratha-stone rounded select-all">
                                                        images/{selectedFort.id}_geo.jpg
                                                    </code>
                                                    <p class="text-gray-500 mt-1">Upload your file to this path in GitHub to load it automatically.</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* MAP 2: Architectural Layout & Defensive Structures */}
                                <div class="bg-maratha-stone/20 rounded-xl p-5 border border-gray-800 flex flex-col h-[340px]">
                                    <div class="flex justify-between items-center mb-3">
                                        <h4 class="text-xs font-bold uppercase tracking-widest text-maratha-brass">
                                            Map 2 &bull; Architectural Blueprint
                                        </h4>
                                        <span class="text-[10px] text-maratha-saffron bg-maratha-saffron/10 border border-maratha-saffron/20 py-1 px-2.5 rounded-md font-semibold">
                                            Click steps to locate
                                        </span>
                                    </div>

                                    <div class="flex-1 bg-maratha-charcoal rounded-lg relative overflow-hidden flex items-center justify-center border border-gray-800/80 shadow-inner">
                                        {viewMode === "interactive" ? (
                                            /* Fully Interactive SVG Vector Fortress Plan */
                                            <div class="relative w-full h-full">
                                                <svg class="absolute inset-0 w-full h-full" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
                                                    
                                                    {/* Outer walls layout line representing fortress layout */}
                                                    <path d="M 120 300 Q 180 260 280 220 T 420 180 T 550 150 L 590 220 L 450 280 L 320 340 Z" 
                                                          fill="none" stroke="#2a2e32" stroke-width="4" stroke-dasharray="5 5" />
                                                    
                                                    {/* Primary defensive stone boundary trace */}
                                                    <path d="M 120 300 Q 180 260 280 220 T 420 180 T 550 150 L 590 220 L 450 280 L 320 340 Z" 
                                                          fill="none" stroke="#e67e22" stroke-opacity="0.3" stroke-width="12" />

                                                    {/* Connective active path visualization dynamically tracing the defense flow step */}
                                                    {activeFlowStep >= 0 && (
                                                        <path d="M 120 300 Q 180 260 280 220 T 420 180 T 550 150" 
                                                              fill="none" stroke="#FF6B00" stroke-width="2.5" class="transition-all duration-500" />
                                                    )}

                                                    {/* Interactive node markers on Map */}
                                                    {selectedFort.svgMap.points.map((pt, idx) => (
                                                        <g 
                                                            key={pt.id} 
                                                            class="cursor-pointer group"
                                                            onClick={() => setActiveFlowStep(idx)}
                                                        >
                                                            {/* Highlight Glow outer circle */}
                                                            <circle 
                                                                cx={pt.cx} 
                                                                cy={pt.cy} 
                                                                r={idx === activeFlowStep ? "20" : "12"} 
                                                                fill={idx === activeFlowStep ? "rgba(255,107,0,0.2)" : "rgba(217,119,6,0.1)"} 
                                                                class="transition-all duration-300 animate-pulse"
                                                            />
                                                            {/* Inner core dot */}
                                                            <circle 
                                                                cx={pt.cx} 
                                                                cy={pt.cy} 
                                                                r={idx === activeFlowStep ? "7" : "4.5"} 
                                                                fill={idx === activeFlowStep ? "#FF6B00" : "#D97706"} 
                                                                class="transition-all duration-300"
                                                            />
                                                            {/* Label */}
                                                            <text 
                                                                x={pt.cx} 
                                                                y={pt.cy - (idx === activeFlowStep ? 24 : 16)} 
                                                                text-anchor="middle" 
                                                                fill={idx === activeFlowStep ? "#FF6B00" : "#9CA3AF"} 
                                                                class="text-[10px] font-bold tracking-wide transition-all select-none"
                                                            >
                                                                {pt.name}
                                                            </text>
                                                        </g>
                                                    ))}
                                                </svg>

                                                {/* On-Map HUD indicator */}
                                                <div class="absolute bottom-4 left-4 text-[10px] text-gray-500 bg-maratha-charcoal/80 px-2 py-1.5 rounded border border-gray-800">
                                                    <p>Scale: 1:4000 &bull; Orthogonal Projections</p>
                                                </div>
                                            </div>
                                        ) : (
                                            /* fallback to custom folder for second map image */
                                            <div class="p-6 text-center text-xs text-gray-400 h-full flex flex-col justify-center items-center">
                                                <img 
                                                    src={`images/${selectedFort.id}_layout.jpg`} 
                                                    alt="Architectural Map"
                                                    onError={(e) => {
                                                        e.target.onerror = null;
                                                        e.target.style.display = 'none';
                                                    }}
                                                    class="absolute inset-0 w-full h-full object-cover rounded-lg"
                                                />
                                                <div class="z-10 bg-maratha-charcoal/90 p-4 rounded-xl border border-gray-800">
                                                    <i class="fa-solid fa-file-image text-3xl text-maratha-saffron mb-2"></i>
                                                    <p class="font-bold">Git Asset Target:</p>
                                                    <code class="block text-maratha-brass my-1 p-1 bg-maratha-stone rounded select-all">
                                                        images/{selectedFort.id}_layout.jpg
                                                    </code>
                                                    <p class="text-gray-500 mt-1">Upload your file to this path in GitHub to load it automatically.</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                            </div>

                            {/* FLOW DIAGRAM SECTION (Sequential Defense Funnel) */}
                            <div class="bg-maratha-stone/20 rounded-xl p-5 border border-gray-800 flex flex-col">
                                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-3">
                                    <div>
                                        <h4 class="text-xs font-bold uppercase tracking-widest text-maratha-brass">
                                            Section 3 &bull; Strategic Defensive Flow & Entry Corridor
                                        </h4>
                                        <p class="text-[10px] text-gray-500">
                                            How Maratha forces structured progressive security checkpoints to trap hostile forces
                                        </p>
                                    </div>
                                    <span class="text-xs font-semibold text-gray-400">
                                        Active Step: {activeFlowStep + 1} of {selectedFort.defenseFlow.length}
                                    </span>
                                </div>

                                <div class="flex flex-col lg:flex-row gap-4 items-stretch justify-between w-full">
                                    {selectedFort.defenseFlow.map((stepData, index) => (
                                        <div 
                                            key={stepData.step}
                                            onClick={() => setActiveFlowStep(index)}
                                            class={`flex-1 p-4 rounded-xl cursor-pointer border transition-all duration-300 relative ${
                                                activeFlowStep === index 
                                                    ? "bg-maratha-saffron/10 border-maratha-saffron shadow-lg shadow-maratha-saffron/5" 
                                                    : "bg-maratha-charcoal border-gray-800 hover:border-gray-700"
                                            }`}
                                        >
                                            {/* Connector line between steps */}
                                            {index < selectedFort.defenseFlow.length - 1 && (
                                                <div class="hidden lg:block absolute top-1/2 -right-3 w-6 h-[2px] bg-gray-800 z-10"></div>
                                            )}

                                            <div class="flex items-center gap-2 mb-2">
                                                <span class={`w-5 h-5 text-[10px] font-extrabold rounded-full flex items-center justify-center ${
                                                    activeFlowStep === index 
                                                        ? "bg-maratha-saffron text-white" 
                                                        : "bg-maratha-stone text-gray-400"
                                                }`}>
                                                    {stepData.step}
                                                </span>
                                                <h5 class={`font-bold text-xs uppercase tracking-wide truncate ${
                                                    activeFlowStep === index ? "text-maratha-saffron" : "text-gray-300"
                                                }`}>
                                                    {stepData.title}
                                                </h5>
                                            </div>
                                            <p class="text-[11px] text-gray-400 line-clamp-3">
                                                {stepData.desc}
                                            </p>
                                        </div>
                                    ))}
                                </div>

                                {/* Flow custom upload target indicator */}
                                {viewMode === "custom" && (
                                    <div class="mt-4 p-3 bg-maratha-charcoal rounded-lg border border-gray-800 text-[11px] text-gray-400 text-center">
                                        <i class="fa-solid fa-code-merge text-maratha-saffron mr-2"></i>
                                        Custom defense flow diagram file path: <code class="bg-maratha-stone p-1 rounded text-maratha-brass select-all">images/{selectedFort.id}_flow.jpg</code>
                                    </div>
                                )}
                            </div>

                        </div>

                    </main>

                    {/* MOBILE FALLBACK INFO PANEL */}
                    <div class="md:hidden flex-1 flex flex-col justify-center items-center p-6 text-center bg-[#151718]">
                        <i class="fa-solid fa-desktop text-5xl text-maratha-saffron mb-4"></i>
                        <h3 class="text-xl font-bold text-gray-200">Interactive Dashboard</h3>
                        <p class="text-sm text-gray-400 mt-2 max-w-xs">
                            Please open this dashboard on a desktop screen or tablet device to view the dynamic map blueprints and high-fidelity military diagrams.
                        </p>
                        <div class="mt-6 p-4 bg-maratha-charcoal/80 border border-gray-800 rounded-xl text-left w-full text-xs">
                            <h4 class="font-extrabold text-maratha-brass uppercase tracking-wider mb-2">Selected Fort: {selectedFort.name}</h4>
                            <p class="text-gray-300">{selectedFort.description}</p>
                            <p class="mt-2 text-gray-500">Elevation: {selectedFort.elevation} &bull; Dist: {selectedFort.district}</p>
                        </div>
                    </div>

                </div>
            );
        }

        // Render the application into DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
