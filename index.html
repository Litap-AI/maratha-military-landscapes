    // Smart Image Component with loading tracking & accurate fallbacks
    function SmartImage({ src, alt }) {
      const [status, setStatus] = useState('loading'); // 'loading' | 'loaded' | 'error'

      // Reset loading status whenever the source changes
      useEffect(() => {
        setStatus('loading');
      }, [src]);

      return (
        <div class="relative w-full aspect-video rounded-xl bg-[#111822] border border-slate-800 flex items-center justify-center overflow-hidden">
          {/* 1. Loader screen shown ONLY during loading */}
          {status === 'loading' && (
            <div class="absolute inset-0 flex items-center justify-center bg-slate-950/80 z-20">
              <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-saffron-500"></div>
            </div>
          )}

          {/* 2. Error target shown ONLY if image truly fails */}
          {status === 'error' && (
            <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center bg-[#151c28] z-10 border border-slate-800">
              <svg class="w-8 h-8 text-saffron-500/80 mb-2 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <p class="text-xs font-bold text-slate-400">Git Asset Target:</p>
              <code class="text-saffron-500 bg-slate-950 px-1.5 py-0.5 rounded text-[11px] font-mono my-2 border border-slate-800/80 max-w-[90%] break-all">{src}</code>
              <p class="text-[10px] text-slate-500 max-w-[280px] leading-relaxed">
                Upload your file to this path in GitHub to load it automatically.
              </p>
            </div>
          )}

          {/* 3. The actual image tag */}
          <img 
            src={src} 
            alt={alt}
            onLoad={() => setStatus('loaded')}
            onError={() => setStatus('error')}
            class={`w-full h-full object-cover transition-opacity duration-300 ${
              status === 'loaded' ? 'opacity-100 z-10' : 'opacity-0'
            }`}
          />
        </div>
      );
    }

      // Filter logic to exactly match your screenshot
      const filteredForts = FORTS_DATA.filter(fort => {
        const matchesSearch = fort.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                              fort.location.toLowerCase().includes(searchTerm.toLowerCase());
        const matchesFilter = activeFilter === "All Terrains" || fort.type === activeFilter;
        return matchesSearch && matchesFilter;
      });

      return (
        <div class="flex flex-col lg:flex-row h-screen w-full">
          
          {/* SIDEBAR - 1/3 Screen */}
          <aside class="w-full lg:w-[30%] bg-[#0e131d] border-b lg:border-b-0 lg:border-r border-saffron-500/20 flex flex-col h-2/5 lg:h-full z-10">
            
            {/* Header / Brand Details */}
            <div class="p-5 border-b border-slate-800/80 bg-[#0b0f17]/50">
              <div class="flex items-center gap-2.5">
                <div class="bg-saffron-500 text-slate-950 text-[10px] font-extrabold px-2 py-0.5 rounded tracking-wider uppercase">
                  UNESCO
                </div>
                <span class="text-xs text-slate-400 font-bold tracking-wider uppercase">World Heritage Site</span>
              </div>
              <h1 class="text-lg font-black text-slate-100 tracking-wide mt-1.5 uppercase leading-none">
                Maratha Military Landscapes
              </h1>
              <p class="text-[10.5px] text-slate-400 font-medium mt-1">
                India's 44th World Heritage Property • 12 Legendary Forts
              </p>
              
              {/* Custom Search Bar with Icon */}
              <div class="mt-4 relative">
                <input 
                  type="text" 
                  placeholder="Search fort or district..." 
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  class="w-full bg-[#111822] border border-slate-800 focus:border-saffron-500/50 text-slate-100 placeholder-slate-500 text-xs px-3.5 py-2.5 rounded-lg outline-none transition"
                />
              </div>

              {/* Exact Pill Filters from your screenshot */}
              <div class="flex gap-1.5 mt-3 overflow-x-auto pb-1">
                {["All Terrains", "Hill", "Hill-Forest", "Hill-Plateau", "Coastal", "Island"].map(filter => (
                  <button
                    key={filter}
                    onClick={() => setActiveFilter(filter)}
                    class={`text-[10px] px-3 py-1 rounded-full border transition font-bold whitespace-nowrap ${
                      activeFilter === filter 
                        ? "bg-saffron-500 text-slate-950 border-saffron-500" 
                        : "bg-[#111822]/40 text-slate-400 border-slate-800 hover:text-slate-200"
                    }`}
                  >
                    {filter}
                  </button>
                ))}
              </div>
            </div>

            {/* Scrollable List of Forts */}
            <div class="flex-1 overflow-y-auto p-3.5 space-y-1.5 bg-[#0b0f17]/20">
              {filteredForts.length > 0 ? (
                filteredForts.map(fort => {
                  const isSelected = selectedFort.id === fort.id;
                  return (
                    <div 
                      key={fort.id}
                      onClick={() => setSelectedFort(fort)}
                      class={`p-3.5 rounded-xl cursor-pointer transition-all duration-300 relative overflow-hidden group border ${
                        isSelected 
                          ? "bg-[#1c2433] border-saffron-500 text-slate-100 shadow-md" 
                          : "bg-[#111822]/40 hover:bg-[#111822] border-slate-900 hover:border-slate-800 text-slate-400"
                      }`}
                    >
                      {/* Orange sidebar selection indicator bar */}
                      {isSelected && (
                        <div class="absolute left-0 top-0 h-full w-1 bg-saffron-500" />
                      )}
                      
                      <div class="flex justify-between items-start">
                        <div>
                          <h3 class="font-bold text-sm tracking-wide text-slate-100 group-hover:text-saffron-500 transition">
                            {fort.name}
                          </h3>
                          <p class="text-[11px] text-slate-500 mt-0.5">
                            {fort.location}, {fort.type} Fort
                          </p>
                        </div>
                        <span class={`text-[9px] px-2 py-0.5 rounded font-bold uppercase ${
                          fort.type === 'Coastal' || fort.type === 'Island' 
                            ? 'bg-blue-950/40 text-blue-400 border border-blue-900/30' 
                            : 'bg-amber-950/40 text-amber-400 border border-amber-900/30'
                        }`}>
                          {fort.type}
                        </span>
                      </div>
                    </div>
                  );
                })
              ) : (
                <div class="text-center py-8 text-slate-600 text-xs">
                  No forts match your selected filter.
                </div>
              )}
            </div>
            
            {/* Sidebar bottom signature */}
            <div class="p-3 border-t border-slate-800/50 bg-[#070a10] text-[10px] text-slate-600 text-center font-semibold">
              Designed for Maratha History Research • Created by Rohit Patil • v1.2 Active State
            </div>
          </aside>

          {/* MAIN WORKSPACE - 2/3 Screen */}
          <main class="w-full lg:w-[70%] h-3/5 lg:h-full overflow-y-auto bg-[#0b0f17] flex flex-col">
            
            {/* Header Bar matching screenshot styling */}
            <header class="p-5 border-b border-slate-800/80 bg-[#0e131d]/30 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
              <div>
                <span class="text-[10px] font-extrabold text-saffron-500 tracking-wider uppercase">⚔️ Tactical Analysis</span>
                <div class="flex items-center gap-2.5 mt-0.5">
                  <h2 class="text-2xl font-extrabold text-slate-100 uppercase tracking-wide">
                    {selectedFort.name}
                  </h2>
                  <span class="text-[10px] text-saffron-500 font-bold border border-saffron-500/30 px-2 py-0.5 rounded-full bg-saffron-500/5">
                    {selectedFort.type} Terrain
                  </span>
                </div>
              </div>

              {/* Seamless Blueprint vs Custom toggles */}
              <div class="flex items-center gap-1.5 bg-[#111822] p-1 rounded-xl border border-slate-800">
                <button 
                  onClick={() => setUseCustomImages(false)}
                  class={`px-3.5 py-1.5 rounded-lg text-xs font-extrabold transition-all duration-300 ${
                    !useCustomImages 
                      ? "bg-[#1d2736] text-slate-100 shadow-md" 
                      : "text-slate-500 hover:text-slate-300"
                  }`}
                >
                  🌐 Dynamic Blueprints
                </button>
                <button 
                  onClick={() => setUseCustomImages(true)}
                  class={`px-3.5 py-1.5 rounded-lg text-xs font-extrabold transition-all duration-300 ${
                    useCustomImages 
                      ? "bg-saffron-500 text-slate-950 shadow-md" 
                      : "text-slate-500 hover:text-slate-300"
                  }`}
                >
                  📷 Custom Git Images
                </button>
              </div>
            </header>

            {/* Scrollable contents frame */}
            <div class="p-5 sm:p-7 space-y-6 max-w-6xl mx-auto w-full flex-1">
              
              {/* Dynamic Maps Area */}
              <section class="grid grid-cols-1 md:grid-cols-2 gap-5">
                
                {/* Map 1: Topographical / Geographical Context */}
                <div class="bg-[#0e131d]/60 border border-slate-800 rounded-2xl p-4.5 flex flex-col justify-between">
                  <div class="mb-3.5 flex justify-between items-center">
                    <h4 class="text-slate-400 text-[11px] font-black uppercase tracking-wider">Map 1 • Topographical Context</h4>
                    <span class="text-[9px] bg-[#111822] px-2 py-0.5 rounded text-slate-500 border border-slate-800">Terrain: {selectedFort.type} Base</span>
                  </div>

                  {!useCustomImages ? (
                    // VECHILE VECTOR MAP BLUEPRINT
                    <div class="relative w-full aspect-video rounded-xl bg-[#111822] border border-slate-800 overflow-hidden">
                      <svg class="w-full h-full" viewBox="0 0 400 200">
                        <defs>
                          <linearGradient id="blueprint-grid" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#121824" />
                            <stop offset="100%" stop-color="#0a0f18" />
                          </linearGradient>
                        </defs>
                        <rect width="100%" height="100%" fill="url(#blueprint-grid)" />
                        
                        {/* Grid Blueprint overlay lines */}
                        <line x1="100" y1="0" x2="100" y2="200" stroke="#1e293b" stroke-dasharray="3 3" opacity="0.4" />
                        <line x1="200" y1="0" x2="200" y2="200" stroke="#1e293b" stroke-dasharray="3 3" opacity="0.4" />
                        <line x1="300" y1="0" x2="300" y2="200" stroke="#1e293b" stroke-dasharray="3 3" opacity="0.4" />
                        <line x1="0" y1="100" x2="400" y2="100" stroke="#1e293b" stroke-dasharray="3 3" opacity="0.4" />

                        {/* Topographical contours */}
                        <path d="M0 190 Q 100 130, 200 170 T 400 120" fill="none" stroke="#334155" stroke-width="1.2" opacity="0.4" />
                        <path d="M0 170 Q 120 100, 220 150 T 400 90" fill="none" stroke="#475569" stroke-width="1.2" opacity="0.4" />
                        <path d="M0 140 Q 140 70, 240 120 T 400 60" fill="none" stroke="#f39c12" stroke-width="2" class="opacity-20" />

                        {/* Current peak elevation vector path */}
                        <path d={selectedFort.topoPaths} fill="none" stroke={selectedFort.svgColors.primary} stroke-width="2.5" stroke-linecap="round" />
                        
                        {/* Selected Beacon node indicator */}
                        <circle cx="280" cy="60" r="7" fill="#f39c12" class="animate-ping" opacity="0.7" />
                        <circle cx="280" cy="60" r="4.5" fill="#f39c12" />
                        <text x="292" y="63" fill="#f39c12" font-size="9" font-weight="bold">Tactical Summit</text>

                        {/* Dynamic sea vector highlights */}
                        {(selectedFort.type === "Coastal" || selectedFort.type === "Island") && (
                          <path d="M 0 170 C 100 170, 200 160, 400 185 L 400 200 L 0 200 Z" fill="#0284c7" opacity="0.2" />
                        )}
                      </svg>
                    </div>
                  ) : (
                    // HIGH FIDELITY SMART IMAGE CARDS
                    <SmartImage 
                      src={`images/${selectedFort.id}_geo.jpg`} 
                      alt="Topographical Map" 
                    />
                  )}
                </div>

                {/* Map 2: Architectural Details */}
                <div class="bg-[#0e131d]/60 border border-slate-800 rounded-2xl p-4.5 flex flex-col justify-between">
                  <div class="mb-3.5 flex justify-between items-center">
                    <h4 class="text-slate-400 text-[11px] font-black uppercase tracking-wider">Map 2 • Architectural Blueprint</h4>
                    <span class="text-[9px] text-saffron-500 font-bold bg-[#1d1811] border border-saffron-500/20 px-2.5 py-0.5 rounded">Click steps to locate</span>
                  </div>

                  {!useCustomImages ? (
                    // VECHILE VECTOR MAP BLUEPRINT FOR ARCHITECTURE
                    <div class="relative w-full aspect-video rounded-xl bg-[#111822] border border-slate-800 overflow-hidden">
                      <svg class="w-full h-full" viewBox="0 0 400 200">
                        <rect width="100%" height="100%" fill="#0a0f18" />
                        
                        {/* Fortress walls design schematic */}
                        <polygon points="15,175 145,135 345,115 385,45 295,35 45,95" fill="none" stroke="#1e293b" stroke-width="3" />
                        <polygon points="35,165 135,125 325,105 365,55 275,45 65,85" fill="none" stroke="#2c3e50" stroke-width="1.5" />
                        
                        {/* Connection line pathways */}
                        <line x1="80" y1="150" x2="180" y2="110" stroke="#f39c12" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.7" />
                        <line x1="180" y1="110" x2="260" y2="70" stroke="#f39c12" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.7" />
                        <line x1="260" y1="70" x2="330" y2="50" stroke="#f39c12" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.7" />

                        {/* Clickable steps nodes */}
                        {selectedFort.fortLayout.map((node, idx) => {
                          const isCurrentStep = selectedFort.steps[activeStep].name.toLowerCase().includes(node.label.split(' ')[0].toLowerCase());
                          return (
                            <g key={idx} class="cursor-pointer" onClick={() => {
                              const stepIdx = selectedFort.steps.findIndex(s => s.name.toLowerCase().includes(node.label.split(' ')[0].toLowerCase()));
                              if(stepIdx !== -1) setActiveStep(stepIdx);
                            }}>
                              <circle 
                                cx={node.x} 
                                cy={node.y} 
                                r={node.r} 
                                fill={isCurrentStep ? "#f39c12" : "#111822"} 
                                stroke={isCurrentStep ? "#ffffff" : "#f39c12"} 
                                stroke-width="1.8" 
                                class="transition-all duration-300"
                              />
                              <text 
                                cx={node.x} 
                                cy={node.y} 
                                x={node.x}
                                y={node.y + 3}
                                fill={isCurrentStep ? "#0f172a" : "#ffffff"} 
                                font-size="9" 
                                font-weight="extrabold" 
                                text-anchor="middle"
                              >
                                {idx + 1}
                              </text>
                              <text 
                                x={node.x} 
                                y={node.y - 14} 
                                fill={isCurrentStep ? "#f39c12" : "#94a3b8"} 
                                font-size="9" 
                                font-weight="bold" 
                                text-anchor="middle"
                              >
                                {node.label}
                              </text>
                            </g>
                          );
                        })}
                      </svg>
                    </div>
                  ) : (
                    <SmartImage 
                      src={`images/${selectedFort.id}_layout.jpg`} 
                      alt="Architectural Blueprint Layout" 
                    />
                  )}
                </div>

              </section>

              {/* Dynamic Bottom Section - Section 3: Strategic Defensive Flow & Entry Corridor */}
              <section class="bg-[#0e131d]/60 border border-slate-800 rounded-2xl p-5 sm:p-7 space-y-5">
                <div class="flex justify-between items-center flex-wrap gap-2">
                  <div>
                    <h4 class="text-slate-500 text-[10px] font-black uppercase tracking-wider">Section 3 • Strategic Defensive Flow & Entry Corridor</h4>
                    <p class="text-xs text-slate-400 mt-1">How Maratha forces structured progressive security checkpoints to trap hostile forces</p>
                  </div>
                  <span class="text-xs text-slate-400 font-bold">
                    Active Step: <strong class="text-saffron-500">{activeStep + 1} of {selectedFort.steps.length}</strong>
                  </span>
                </div>

                {!useCustomImages ? (
                  // INTERACTIVE DYNAMIC Blueprints - Flow Steps Steps Indicator Row
                  <div class="space-y-5">
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3.5">
                      {selectedFort.steps.map((step, idx) => {
                        const isActive = activeStep === idx;
                        return (
                          <div 
                            key={idx}
                            onClick={() => setActiveStep(idx)}
                            class={`p-3 rounded-xl cursor-pointer border text-center transition-all duration-300 ${
                              isActive 
                                ? "bg-saffron-500 text-slate-950 border-white shadow-lg shadow-saffron-500/10" 
                                : "bg-[#111822] hover:bg-slate-850 text-slate-400 border-slate-800/80 hover:border-slate-700"
                            }`}
                          >
                            <span class={`text-[9px] font-black uppercase tracking-wider block mb-1 ${
                              isActive ? "text-slate-900" : "text-saffron-500"
                            }`}>
                              Step 0{idx + 1}
                            </span>
                            <h5 class="font-extrabold text-[11px] uppercase tracking-wide truncate">{step.name}</h5>
                          </div>
                        );
                      })}
                    </div>

                    {/* Step Highlight Explainer detail card */}
                    <div class="bg-[#0b0f17]/80 p-4.5 rounded-xl border border-slate-800 flex gap-4 items-start">
                      <div class="w-8 h-8 rounded-lg bg-saffron-500/10 border border-saffron-500/20 flex items-center justify-center text-saffron-500 shrink-0 text-sm font-extrabold mt-0.5">
                        {activeStep + 1}
                      </div>
                      <div>
                        <h6 class="text-saffron-500 text-[10px] font-black uppercase tracking-wider">Strategic Defense Function</h6>
                        <h5 class="text-slate-100 font-extrabold text-sm uppercase tracking-wide mt-0.5">{selectedFort.steps[activeStep].name}</h5>
                        <p class="text-slate-400 text-xs mt-1.5 leading-relaxed">{selectedFort.steps[activeStep].desc}</p>
                      </div>
                    </div>
                  </div>
                ) : (
                  // CUSTOM IMAGE FLOW PORTAL - NOW FULLY ACCURATE IN CUSTOM MODE!
                  <div class="space-y-4">
                    <SmartImage 
                      src={`images/${selectedFort.id}_flow.jpg`} 
                      alt="Defensive Entry Flow Diagram" 
                    />
                    <div class="text-center">
                      <p class="text-[10px] text-slate-500 font-mono tracking-wider flex items-center justify-center gap-1.5">
                        <span class="inline-block w-1.5 h-1.5 rounded-full bg-saffron-500"></span>
                        Custom defense flow diagram file path: <span class="text-saffron-500">images/{selectedFort.id}_flow.jpg</span>
                      </p>
                    </div>
                  </div>
                )}
              </section>

              {/* Fort Historic Summary Narrative */}
              <section class="bg-[#0e131d]/30 border border-slate-800/80 rounded-2xl p-5 sm:p-7 flex flex-col md:flex-row gap-5">
                <div class="flex-1">
                  <h4 class="text-saffron-500 text-[10px] font-black uppercase tracking-wider mb-2">Architectural Engineering Statement</h4>
                  <p class="text-slate-200 font-semibold text-base leading-relaxed">{selectedFort.tagline}</p>
                  <p class="text-slate-400 text-xs mt-2.5 leading-relaxed">{selectedFort.description}</p>
                </div>
                <div class="md:w-[250px] bg-[#111822]/80 border border-slate-800 rounded-xl p-4 flex flex-col justify-between shrink-0">
                  <div class="space-y-2.5 text-xs">
                    <div class="flex justify-between border-b border-slate-800/60 pb-2">
                      <span class="text-slate-500">Coordinates:</span>
                      <span class="font-bold text-slate-300 font-mono">{selectedFort.coordinates}</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-800/60 pb-2">
                      <span class="text-slate-500">Elevation:</span>
                      <span class="font-bold text-slate-300">{selectedFort.elevation}</span>
                    </div>
                    <div class="flex justify-between">
                      <span class="text-slate-500">Defense Type:</span>
                      <span class="font-bold text-saffron-500">{selectedFort.type}</span>
                    </div>
                  </div>
                  <div class="mt-4 pt-3.5 border-t border-slate-800/60 flex items-center gap-2">
                    <svg class="w-4 h-4 text-saffron-500 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                      <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                    <span class="text-[10px] font-extrabold text-slate-400 tracking-wider uppercase">Strategic Landscape Core</span>
                  </div>
                </div>
              </section>

            </div>
          </main>

        </div>
      );
    }

    // Mount the React application to DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
